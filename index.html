<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mia Spa - Booking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #faf6f6; color: #4A3538; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* Contenedor de la Gift Card - Ajuste de escala automático */
        .card-canvas {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1.5 / 1;
            background-color: #DCA9B0; 
            border-radius: 1rem;
            overflow: hidden;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            container-type: inline-size;
        }

        .text-overlay {
            width: 80%;
            text-align: center;
        }

        /* Usamos cqi (container query inline-size) para que el texto sea siempre proporcional a la tarjeta */
        .text-msg { font-size: 5cqi; font-style: italic; color: white; margin-bottom: 2cqi; }
        .text-names { font-size: 6cqi; font-weight: 600; color: white; }
        
        .btn-selected { background-color: #DCA9B0 !important; color: white !important; border-color: #DCA9B0 !important; }
        .service-btn { transition: all 0.2s; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- 1. ZONA DE CONFIGURACIÓN DE DATOS -->
    <script>
        // --- AQUÍ PUEDES ACTUALIZAR LOS PRECIOS Y NOMBRES FÁCILMENTE ---
        const CONFIG = {
            whatsappNumber: "19194551783", // Número de Nancy
            servicios: [
                { id: 's1', name_es: 'Ritual Signature', name_en: 'Ritual Signature', price: 1 },
                { id: 's2', name_es: 'Stone Therapy', name_en: 'Stone Therapy', price: 1 },
                { id: 's3', name_es: 'Drenaje Linfático', name_en: 'Lymphatic Drainage', price: 1 },
                { id: 's4', name_es: 'Masaje Relajante', name_en: 'Relaxing Massage', price: 1 },
                { id: 's5', name_es: 'Bambuterapia', name_en: 'Bamboo Therapy', price: 1 }
            ]
        };

        const i18n = {
            es: { tServ: '1. Seleccionar Servicio', tCal: '2. Elegir Fecha y Hora', tGift: '3. Personalizar Gift Card', btnDown: 'Descargar Imagen', btnWa: 'Finalizar Reserva por WhatsApp', msgTo: 'PARA:', msgFrom: 'DE:', phTo: 'Para / To:', phFrom: 'De / From:', phMsg: 'Tu mensaje especial...' },
            en: { tServ: '1. Select Service', tCal: '2. Choose Date & Time', tGift: '3. Personalize Gift Card', btnDown: 'Download Image', btnWa: 'Finish Booking via WhatsApp', msgTo: 'TO:', msgFrom: 'FROM:', phTo: 'To:', phFrom: 'From:', phMsg: 'Your special message...' }
        };
    </script>

    <!-- Selector de Idioma -->
    <div class="max-w-4xl mx-auto flex justify-end mb-4">
        <select id="lang-selector" onchange="changeLanguage(this.value)" class="bg-white border p-2 rounded-lg text-sm">
            <option value="es">🇪🇸 Español</option>
            <option value="en">🇺🇸 English</option>
        </select>
    </div>

    <main class="max-w-4xl mx-auto space-y-12">
        
        <!-- SECCIÓN 1: SERVICIOS -->
        <section class="bg-white p-6 rounded-3xl shadow-sm border border-pink-100">
            <h3 id="t-serv" class="text-2xl mb-6">1. Seleccionar Servicio</h3>
            <div id="service-grid" class="grid md:grid-cols-2 gap-4">
                <!-- Se genera dinámicamente -->
            </div>
        </section>

        <!-- SECCIÓN 2: CALENDARIO -->
        <section class="bg-white p-6 rounded-3xl shadow-sm border border-pink-100">
            <h3 id="t-cal" class="text-2xl mb-4">2. Elegir Fecha y Hora</h3>
            <div id="calendar-days" class="grid grid-cols-7 gap-2 mb-6"></div>
            <div id="time-grid" class="grid grid-cols-4 gap-2">
                <button onclick="setTime('09:00 AM', this)" class="time-btn py-2 border rounded-lg hover:bg-pink-100">09:00 AM</button>
                <button onclick="setTime('11:30 AM', this)" class="time-btn py-2 border rounded-lg hover:bg-pink-100">11:30 AM</button>
                <button onclick="setTime('02:00 PM', this)" class="time-btn py-2 border rounded-lg hover:bg-pink-100">02:00 PM</button>
                <button onclick="setTime('04:30 PM', this)" class="time-btn py-2 border rounded-lg hover:bg-pink-100">04:30 PM</button>
            </div>
        </section>

        <!-- SECCIÓN 3: PERSONALIZAR GIFT CARD -->
        <section class="bg-white p-6 rounded-3xl shadow-sm border border-pink-100">
            <h3 id="t-gift" class="text-2xl mb-6">3. Personalizar Gift Card</h3>
            <div class="grid md:grid-cols-2 gap-8 items-start">
                <div class="space-y-4">
                    <input type="text" id="in-to" oninput="updateCard()" placeholder="Para / To:" class="w-full p-3 border rounded-xl">
                    <input type="text" id="in-from" oninput="updateCard()" placeholder="De / From:" class="w-full p-3 border rounded-xl">
                    <textarea id="in-msg" oninput="updateCard()" placeholder="Mensaje / Message:" class="w-full p-3 border rounded-xl h-24"></textarea>
                </div>
                <div class="text-center">
                    <div id="card-render" class="card-canvas">
                        <div class="text-overlay">
                            <div id="out-msg" class="text-msg"></div>
                            <div id="out-names" class="text-names"></div>
                        </div>
                    </div>
                    <button id="btn-down" onclick="downloadCard()" class="mt-4 text-pink-500 underline font-bold">Descargar Imagen</button>
                </div>
            </div>
        </section>

        <!-- BOTÓN FINAL -->
        <div class="text-center pb-20">
            <a id="wa-link" href="#" class="inline-block bg-pink-400 text-white px-12 py-4 rounded-full font-bold shadow-lg hover:bg-pink-600 transition">
                Finalizar Reserva
            </a>
        </div>
    </main>

    <script>
        let state = { service: '', price: 0, date: '', time: '', lang: 'es' };

        // Inicializar Servicios
        function renderServices() {
            const grid = document.getElementById('service-grid');
            grid.innerHTML = '';
            CONFIG.servicios.forEach(s => {
                const btn = document.createElement('button');
                btn.className = "service-btn text-left p-4 border rounded-xl hover:border-pink-300";
                btn.onclick = () => setService(s, btn);
                const name = state.lang === 'es' ? s.name_es : s.name_en;
                btn.innerHTML = `<span class="block font-bold">${name}</span><span class="text-sm text-gray-500">$${s.price}</span>`;
                grid.appendChild(btn);
            });
        }

        function changeLanguage(lang) {
            state.lang = lang;
            const t = i18n[lang];
            document.getElementById('t-serv').innerText = t.tServ;
            document.getElementById('t-cal').innerText = t.tCal;
            document.getElementById('t-gift').innerText = t.tGift;
            document.getElementById('btn-down').innerText = t.btnDown;
            document.getElementById('wa-link').innerText = t.btnWa;
            document.getElementById('in-to').placeholder = t.phTo;
            document.getElementById('in-from').placeholder = t.phFrom;
            document.getElementById('in-msg').placeholder = t.phMsg;
            renderServices();
            updateCard();
        }

        function setService(s, el) {
            state.service = state.lang === 'es' ? s.name_es : s.name_en; 
            state.price = s.price;
            document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('btn-selected'));
            el.classList.add('btn-selected');
            updateBooking();
        }

        function setTime(time, el) {
            state.time = time;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('btn-selected'));
            el.classList.add('btn-selected');
            updateBooking();
        }

        function generateCalendar() {
            const container = document.getElementById('calendar-days');
            for(let i=1; i<=30; i++) {
                const b = document.createElement('button');
                b.innerText = i;
                b.className = "py-2 border rounded-lg hover:bg-pink-100 text-sm";
                b.onclick = () => {
                    state.date = `July ${i}, 2026`;
                    document.querySelectorAll('#calendar-days button').forEach(x => x.classList.remove('btn-selected'));
                    b.classList.add('btn-selected');
                    updateBooking();
                };
                container.appendChild(b);
            }
        }

        function updateCard() {
            const msg = document.getElementById('in-msg').value;
            const to = document.getElementById('in-to').value;
            const from = document.getElementById('in-from').value;
            const t = i18n[state.lang];

            document.getElementById('out-msg').innerText = msg ? `"${msg}"` : '';
            document.getElementById('out-names').innerHTML = `${t.msgFrom} ${from} <br> ${t.msgTo} ${to}`;
        }

        function updateBooking() {
            const to = document.getElementById('in-to').value;
            const from = document.getElementById('in-from').value;
            const msg = document.getElementById('in-msg').value;

            // Formato profesional para Nancy
            const text = state.lang === 'es' ? 
                `✨ *NUEVA SOLICITUD DE RESERVA - MIA SPA* ✨\n\n💆‍♀️ *Servicio:* ${state.service || 'No seleccionado'} ($${state.price})\n📅 *Fecha:* ${state.date || 'No seleccionada'}\n⏰ *Hora:* ${state.time || 'No seleccionada'}\n\n🎁 *DETALLES GIFT CARD*\n👤 De: ${from || 'N/A'}\n👤 Para: ${to || 'N/A'}\n💬 Dedicatoria: "${msg || 'N/A'}"` :
                `✨ *NEW BOOKING REQUEST - MIA SPA* ✨\n\n💆‍♀️ *Service:* ${state.service || 'Not selected'} ($${state.price})\n📅 *Date:* ${state.date || 'Not selected'}\n⏰ *Time:* ${state.time || 'Not selected'}\n\n🎁 *GIFT CARD DETAILS*\n👤 From: ${from || 'N/A'}\n👤 To: ${to || 'N/A'}\n💬 Message: "${msg || 'N/A'}"`;
            
            document.getElementById('wa-link').href = `https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(text)}`;
        }

        function downloadCard() {
            html2canvas(document.getElementById('card-render'), { scale: 3 }).then(canvas => {
                const a = document.createElement('a');
                a.href = canvas.toDataURL("image/png");
                a.download = "Mia-Spa-Gift-Card.png";
                a.click();
            });
        }

        window.onload = () => {
            generateCalendar();
            renderServices();
        };
    </script>
</body>
</html>
